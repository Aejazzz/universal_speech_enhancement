system:
  device: cuda
  mixed_precision: true
  sample_rate: 16000
  dataset_root: "C:/Users/jsm10/OneDrive - Amrita vishwa vidyapeetham/agentic-speech-enhancement/datasets"
  output_root: "outputs"
  mossformer_checkpoint: ""
  policy_checkpoint: "checkpoints/policy_best.pt"
  # Dynamic inference-time routing: speculate + measure DNSMOS to bypass
  # the trained policy's BYPASS bias when the data demands enhancement.
  dynamic_routing: true

policy:
  wavlm_name: "microsoft/wavlm-base-plus"
  hidden_dim: 384
  num_heads: 8
  num_layers: 3
  dropout: 0.30
  num_actions: 4

training:
  batch_size: 8
  epochs: 30
  lr: 1e-4
  weight_decay: 1e-5
  early_stopping_patience: 5
  gradient_clip_norm: 1.0
  distributed: false
  train_manifest: "outputs/manifests/train.csv"
  val_manifest: "outputs/manifests/val.csv"
